spring.application.name=practica4

server.port=8089
# BD en memoria (se destruye al reiniciar)
spring.datasource.url=jdbc:h2:mem:testdb
# BD persistente en fichero
# spring.datasource.url=jdbc:h2:file:./src/main/resources/database
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
# Consola de administración H2
spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console
# Acceso: http://localhost:8089/h2-console/login.do
